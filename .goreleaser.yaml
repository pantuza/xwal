# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 1

release:
  header: |
    ### OpenTelemetry observability

    This release adds **OpenTelemetry metrics and traces** for WAL appends, buffer flushes, backend persistence, replay, and checkpoints. Configure your service **`MeterProvider`** and **`TracerProvider`** (globals or `XWALConfig.Telemetry`) so xwal exports alongside the rest of your stack—typically **OTel → Prometheus** for metrics and **OTLP** for traces. Full instrument and span reference: **[OBSERVABILITY.md](https://github.com/pantuza/xwal/blob/{{ .Tag }}/OBSERVABILITY.md)**. Local demo: **`make run_telemetry_example`**.

    ---

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - skip: true

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
