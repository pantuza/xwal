name: xWAL Release

on:
  push:
    tags:
      - "*" # triggers only if a new tag is pushed

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release xWAL library versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser changelog includes all commits since the previous tag
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: false
      - uses: goreleaser/goreleaser-action@v5
        with:
          args: release --config .goreleaser.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
